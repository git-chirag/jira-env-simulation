name: jira-env
description: A simplified Jira-like ticket management environment for evaluating AI agents on task prioritization and resolution.
version: "1.0.0"
author: Chirag

observation_space:
  type: text
  description: >
    Natural language Jira simulation report describing ticket urgency,
    assignment status, workflow discipline, and the best next move.

action_space:
  type: discrete
  actions:
    - assign_ticket
    - update_status
    - resolve_ticket
    - change_priority
    - add_comment
  description: >
    Jira workflow action chosen for the current synthetic scenario step.

endpoints:
  health: /
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: easy
    description: Assign and resolve a single high-priority ticket correctly.
    steps: 2
    ideal_action: assign_ticket

  - id: medium
    description: Handle multiple tickets with mixed priorities efficiently.
    steps: 3
    ideal_action: assign_ticket

  - id: hard
    description: Prioritize urgent tickets first and avoid workflow mistakes.
    steps: 3
    ideal_action: assign_ticket

  - id: assignment_guard
    description: Avoid resolving a ticket before assignment and preserve workflow discipline.
    steps: 2
    ideal_action: assign_ticket

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5
  score_formula: mean(step_rewards)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
