version: "1.0.0"
author: Chirag
spec_version: 1
name: jira-env
description: A simplified Jira-like ticket management environment for evaluating AI agents on task prioritization and resolution.
type: space
runtime: fastapi
app: server.app:app
port: 7860
entry_point: server:app

observation_space:
  type: text
  description: >
    Natural language or structured ticket-management state containing
    ticket priority, status, assignment, comments, and current step.

action_space:
  type: discrete
  actions:
    - assign_ticket
    - update_status
    - resolve_ticket
    - change_priority
    - add_comment
  description: >
    Structured ticket-management action for the simulated Jira environment.

endpoints:
  - /
  - /reset
  - /step
  - /state
  - /tasks
  - /grader

tasks:
  - id: easy
    difficulty: easy
    description: Resolve a single high-priority ticket by assigning it and then resolving it.
    max_steps: 10
    score_range: [0.0, 1.0]
    grader: graders.easy_grader:EasyGrader

  - id: medium
    difficulty: medium
    description: Resolve multiple tickets with mixed priorities while avoiding unnecessary actions.
    max_steps: 15
    score_range: [0.0, 1.0]
    grader: graders.medium_grader:MediumGrader

  - id: hard
    difficulty: hard
    description: Resolve tickets while optimizing priority and efficiency.
    max_steps: 20
    score_range: [0.0, 1.0]
    grader: graders.hard_grader:HardGrader

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
