spec_version: 1
name: jira-env
description: A simplified Jira-like ticket management environment for evaluating AI agents on task prioritization and resolution.
type: space
runtime: fastapi
app: server.app:app
port: 7860
entry_point: server:app

tasks:
  - id: easy
    description: Resolve a single high-priority ticket
    steps: 10

  - id: medium
    description: Resolve multiple tickets with mixed priorities
    steps: 15

  - id: hard
    description: Resolve tickets while optimizing priority and efficiency
    steps: 20
